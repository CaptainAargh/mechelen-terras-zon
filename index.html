<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechelen Terras in de Zon</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- SunCalc -->
  <script src="https://unpkg.com/suncalc/suncalc.js"></script>

  <!-- Turf.js -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Info panel -->
  <div id="panel">
    <div id="panel-header">
      <div id="brand">
        <span id="brand-icon">☀️</span>
        <div>
          <div id="brand-title">Mechelen Terras</div>
          <div id="brand-sub">in de zon</div>
        </div>
      </div>
    </div>

    <div id="panel-body">
      <div id="time-block">
        <div id="current-time">--:--:--</div>
        <div id="current-date">--</div>
      </div>

      <div id="sun-block">
        <div id="sun-info">Zonpositie laden…</div>
        <div id="sunny-count" class="count-label">Terrassen laden…</div>
      </div>

      <div id="controls">
        <label class="toggle-label">
          <input type="checkbox" id="filter-sunny" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Toon enkel terrassen in de zon
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="show-buildings" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Toon gebouwen
        </label>
      </div>

      <div id="last-updated"></div>
    </div>

    <div id="panel-footer">
      <p>Data: <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a></p>
      <p>Schaduw is een schatting — bomen &amp; luifels niet inbegrepen</p>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <div id="loading-text">Terrassen &amp; gebouwen ophalen…</div>
    </div>
  </div>

  <!-- Error banner -->
  <div id="error" style="display:none"></div>

  <script src="js/osm.js"></script>
  <script src="js/sun.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
