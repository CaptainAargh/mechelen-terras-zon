<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechelen Terras in de Zon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>" />

  <!-- Local vendor libs — no third-party tracking -->
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <script src="vendor/leaflet.js"></script>
  <script src="vendor/suncalc.js"></script>
  <script src="vendor/turf.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="panel">
    <div id="panel-header">
      <div id="brand">
        <span id="brand-icon">☀️</span>
        <div>
          <div id="brand-title">Mechelen Terras</div>
          <div id="brand-sub">in de zon</div>
        </div>
      </div>
    </div>

    <div id="panel-body">

      <div id="time-block">
        <div id="current-time">--:--:--</div>
        <div id="current-date">--</div>
      </div>

      <div id="sun-block">
        <div id="sun-info">Zonpositie laden…</div>
        <div id="bar-counts"></div>
      </div>

      <!-- Terrace confidence filter -->
      <div class="filter-group">
        <div class="filter-label">Terras zekerheid</div>
        <div id="confidence-slider-wrap">
          <input type="range" id="filter-confidence" min="0" max="3" value="0" step="1" />
          <div id="confidence-labels">
            <span>Alles</span>
            <span>Misschien+</span>
            <span>Waarschijnlijk+</span>
            <span>Zeker terras</span>
          </div>
        </div>
      </div>

      <div id="controls">
        <label class="toggle-label">
          <input type="checkbox" id="filter-sunny" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Alleen terrassen in de zon
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="filter-open" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Alleen open terrassen
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="show-buildings" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Toon gebouwen
        </label>
      </div>

      <div id="last-updated"></div>
    </div>

    <div id="panel-footer">
      <p>Data: <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> · ODbL</p>
      <p>Schaduw is een schatting — bomen &amp; luifels niet inbegrepen</p>
    </div>
  </div>

  <div id="map"></div>

  <div id="loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <div id="loading-text">Terrassen laden…</div>
    </div>
  </div>

  <script src="js/osm.js"></script>
  <script src="js/hours.js"></script>
  <script src="js/sun.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
