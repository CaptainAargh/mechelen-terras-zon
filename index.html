<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechelen Terras in de Zon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>" />

  <!-- Local vendor libs — no third-party tracking -->
  <link rel="stylesheet" href="vendor/maplibre-gl.css" />
  <script src="vendor/maplibre-gl.js"></script>
  <script src="vendor/suncalc.js"></script>
  <script src="vendor/turf.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="panel">
    <div id="panel-header">
      <div id="brand">
        <span id="brand-icon">☀️</span>
        <div>
          <div id="brand-title">Mechelen Terras</div>
          <div id="brand-sub">in de zon</div>
        </div>
      </div>
    </div>

    <div id="panel-body">

      <div id="time-block">
        <div id="current-time">--:--:--</div>
        <div id="current-date">--</div>
      </div>

      <div id="sun-block">
        <div id="sun-info">Zonpositie laden…</div>
        <div id="bar-counts"></div>
      </div>

      <!-- Open / all bars toggle — prominent pill buttons -->
      <div class="filter-group">
        <div class="filter-label">Openingstijden</div>
        <div id="open-filter-pills">
          <button class="pill active" data-open="all">Alle bars</button>
          <button class="pill" data-open="open">Nu open</button>
        </div>
      </div>

      <!-- Terrace confidence filter -->
      <div class="filter-group">
        <div class="filter-label">Terras zekerheid</div>
        <div id="confidence-slider-wrap">
          <input type="range" id="filter-confidence" min="0" max="3" value="0" step="1" />
          <div id="confidence-labels">
            <span>Alles</span>
            <span>Misschien+</span>
            <span>Waarschijnlijk+</span>
            <span>Zeker terras</span>
          </div>
        </div>
      </div>

      <div id="controls">
        <label class="toggle-label">
          <input type="checkbox" id="filter-sunny" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Alleen terrassen in de zon
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="show-buildings" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Toon gebouwen
        </label>
        <label class="toggle-label" id="shadow-toggle-wrap" title="Vereist gebouwdata (laden op achtergrond)">
          <input type="checkbox" id="show-shadows" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span id="shadow-toggle-text">Toon zonschaduwen</span>
        </label>
      </div>

      <div id="last-updated"></div>
    </div>

    <div id="panel-footer">
      <p>Data: <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> · ODbL</p>
      <p>Schaduw is een schatting — bomen &amp; luifels niet inbegrepen</p>
    </div>
  </div>

  <div id="map"></div>

  <!-- Sun compass overlay on the map -->
  <div id="sun-compass">
    <div id="sun-compass-inner">
      <span class="compass-label n">N</span>
      <span class="compass-label e">O</span>
      <span class="compass-label s">Z</span>
      <span class="compass-label w">W</span>
      <div id="sun-dot">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="5" fill="#FFB800"/>
          <g stroke="#FFB800" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.93" y1="4.93"  x2="6.93" y2="6.93"/>
            <line x1="17.07" y1="17.07" x2="19.07" y2="19.07"/>
            <line x1="4.93" y1="19.07" x2="6.93" y2="17.07"/>
            <line x1="17.07" y1="6.93"  x2="19.07" y2="4.93"/>
          </g>
        </svg>
      </div>
      <div id="sun-compass-center-dot"></div>
    </div>
    <div id="sun-compass-footer">
      <span id="sun-compass-label">-- · --°</span>
    </div>
  </div>

  <div id="loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <div id="loading-text">Terrassen laden…</div>
    </div>
  </div>

  <script src="js/osm.js"></script>
  <script src="js/hours.js"></script>
  <script src="js/sun.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
